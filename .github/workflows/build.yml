name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed "Asset List Generator.py"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Asset-List-Generator
          path: dist/*.exe
